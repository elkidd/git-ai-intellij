name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Calculate versions
        id: versions
        run: |
          current=$(grep '^version' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/' | sed 's/-SNAPSHOT//')
          IFS='.' read -r major minor patch <<< "$current"
          echo "release=${major}.${minor}.${patch}" >> $GITHUB_OUTPUT
          case "${{ inputs.bump }}" in
            patch) echo "next=${major}.${minor}.$((patch+1))" >> $GITHUB_OUTPUT ;;
            minor) echo "next=${major}.$((minor+1)).0" >> $GITHUB_OUTPUT ;;
            major) echo "next=$((major+1)).0.0" >> $GITHUB_OUTPUT ;;
          esac

      - name: Set release version
        run: sed -i "s/version = \".*\"/version = \"${{ steps.versions.outputs.release }}\"/" build.gradle.kts

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Commit, tag and push release
        run: |
          git config user.name "ElKidd"
          git config user.email "216161602+elkidd@users.noreply.github.com"
          git add build.gradle.kts
          git commit -m "🔖 Release v${{ steps.versions.outputs.release }}"
          git tag "v${{ steps.versions.outputs.release }}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versions.outputs.release }}
          files: build/distributions/*.zip
          generate_release_notes: true

      - name: Bump to next SNAPSHOT
        run: |
          sed -i "s/version = \".*\"/version = \"${{ steps.versions.outputs.next }}-SNAPSHOT\"/" build.gradle.kts
          git add build.gradle.kts
          git commit -m "🔖 Bump to ${{ steps.versions.outputs.next }}-SNAPSHOT"
          git push origin main
