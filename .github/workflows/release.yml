name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      release_version:
        description: 'Override release version (leave empty for auto)'
        required: false
      next_version:
        description: 'Override next version (leave empty for auto)'
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Calculate versions
        id: versions
        run: |
          current=$(grep '^version' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/' | sed 's/-SNAPSHOT//')
          IFS='.' read -r major minor patch <<< "$current"
          release="${{ inputs.release_version }}"
          next="${{ inputs.next_version }}"
          if [ -z "$release" ]; then release="${major}.${minor}.${patch}"; fi
          if [ -z "$next" ]; then
            case "${{ inputs.bump }}" in
              patch) next="${major}.${minor}.$((patch+1))" ;;
              minor) next="${major}.$((minor+1)).0" ;;
              major) next="$((major+1)).0.0" ;;
            esac
          fi
          echo "release=$release" >> $GITHUB_OUTPUT
          echo "next=$next" >> $GITHUB_OUTPUT

      - name: Set release version
        run: sed -i "s/version = \".*\"/version = \"${{ steps.versions.outputs.release }}\"/" build.gradle.kts

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Commit, tag and push release
        run: |
          git config user.name "ElKidd"
          git config user.email "216161602+elkidd@users.noreply.github.com"
          git add build.gradle.kts
          git commit -m "🔖 Release v${{ steps.versions.outputs.release }}"
          git tag "v${{ steps.versions.outputs.release }}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versions.outputs.release }}
          files: build/distributions/*.zip
          generate_release_notes: true

      - name: Bump to next SNAPSHOT
        run: |
          sed -i "s/version = \".*\"/version = \"${{ steps.versions.outputs.next }}-SNAPSHOT\"/" build.gradle.kts
          git add build.gradle.kts
          git commit -m "🔖 Bump to ${{ steps.versions.outputs.next }}-SNAPSHOT"
          git push origin main
